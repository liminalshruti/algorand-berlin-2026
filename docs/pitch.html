document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:        var(--cerulean-500);\n  --cerulean-faint:  var(--cerulean-50);\n  --cerulean-bg:     var(--cerulean-100);\n  --cerulean-tint:   var(--cerulean-200);\n  --cerulean-soft:   var(--cerulean-300);\n  --cerulean-edge:   var(--cerulean-400);\n  --cerulean-glow:        rgba(25,126,235,0.16);\n  --cerulean-wash:        rgba(25,126,235,0.08);\n  --cerulean-wash-deep:   rgba(25,126,235,0.20);\n  --cerulean-strong: var(--cerulean-600);\n\n  /* ornament · Orchid · 300° · LUMINOUS · Quinacridone Violet */\n  --orchid-500: #CC24F5;\n  --orchid-50:  rgba(204,36,245,0.04);\n  --orchid-100: rgba(204,36,245,0.08);\n  --orchid-200: rgba(204,36,245,0.16);\n  --orchid-300: rgba(204,36,245,0.28);\n  --orchid-400: rgba(204,36,245,0.42);\n  --orchid-600: #A91DCC;\n  --orchid-700: #8217A1;\n  --orchid-800: #5E1175;\n  --orchid-900: #3A0A48;\n  --orchid:        var(--orchid-500);\n  --orchid-faint:  var(--orchid-50);\n  --orchid-bg:     var(--orchid-100);\n  --orchid-tint:   var(--orchid-200);\n  --orchid-soft:   var(--orchid-300);\n  --orchid-edge:   var(--orchid-400);\n  --orchid-glow:        rgba(204,36,245,0.20);\n  --orchid-glow-strong: rgba(204,36,245,0.36);\n  --orchid-strong: var(--orchid-600);\n\n  /* ─── 4 · substrate · cream + ink ──────────────────────────\n     Cream/ink axis. The dark theme (default) is the introverted \"inner-face\"\n     register. The cream theme (paper aliases) is the extraverted \"outer-face\"\n     register — printable artifacts, packets, audit chains. */\n  --cream-50:   #FBFAF8;\n  --cream-100:  #F3F1EF;\n  --cream-200:  #EBE8E4;\n  --cream-300:  #E0DCD4;\n  --cream-400:  #C8C2B5;\n  --cream-500:  #9C9587;\n  --cream-600:  #6E6857;\n  --cream-700:  #4A4538;\n  --cream-800:  #2A2620;\n  --cream-900:  #14110D;\n  --cream:      var(--cream-100);\n  --cream-deep: var(--cream-200);\n  --ink:        #0F0F10;\n\n  /* paper aliases · for on-screen-as-paper rendering (packets, audits) */\n  --paper-bg:        var(--cream-100);\n  --paper-bg-soft:   var(--cream-50);\n  --paper-bg-deep:   var(--cream-200);\n  --paper-line:      var(--cream-300);\n  --paper-line-soft: var(--cream-400);\n  --paper-faint:     var(--cream-600);\n  --paper-mid:       var(--cream-700);\n  --paper-strong:    var(--cream-800);\n  --paper-fg:        var(--cream-900);\n\n  /* ─── 5 · ink · 5 text tiers · WCAG AA on --bg ─────────── */\n  --text:         #F4F2EE;\n  --text-mid:     #C9C5BD;\n  --text-dim:     #8A8780;\n  --text-faint:   #6B6862;   /* a11y pass 1, 2026-05-12 — 4.5:1 on --bg */\n  --text-mute:    #3A3833;\n\n  /* ─── 6 · type families (LOCKED — no substitutions) ────── */\n  --display: \"NinetiesHeadliner\", \"Perfectly Nineties\", \"PerfectlyNineties\", \"Iowan Old Style\", Georgia, serif;\n  --serif:   \"PerfectlyNineties\", \"Perfectly Nineties\", \"Iowan Old Style\", Georgia, serif;\n  --sans:    \"Geist\", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;\n  --mono:    \"Geist Mono\", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;\n  --hand:    \"Caveat\", \"Patrick Hand\", cursive;\n\n  /* ─── 7 · type scale (18 sizes) ────────────────────────── */\n  --fs-eyebrow:    9px;\n  --fs-mono-xs:   10px;\n  --fs-mono-sm:   11px;\n  --fs-mono:      12px;\n  --fs-mono-lg:   13px;\n  --fs-xs:        12px;\n  --fs-sm:      13.5px;\n  --fs-body:      14px;\n  --fs-body-tight: 14.5px;\n  --fs-base:      15px;\n  --fs-md:        17px;\n  --fs-lg:        19px;\n  --fs-lede:      20px;\n  --fs-xl:        22px;\n  --fs-2xl:       28px;\n  --fs-3xl:       36px;\n  --fs-interior:  36px;\n  --fs-check:     30px;\n  --fs-delta:     56px;\n  --fs-display:   64px;\n\n  /* ─── 8 · line-height ──────────────────────────────────── */\n  --lh-tight:    1;\n  --lh-snug:     1.2;\n  --lh-normal:   1.45;\n  --lh-relaxed:  1.55;\n  --lh-loose:    1.65;\n\n  /* ─── 9 · letter-spacing ───────────────────────────────── */\n  --ls-mono:     0.18em;\n  --ls-mono-sm:  0.16em;\n  --ls-mono-lg:  0.20em;\n  --ls-tight:   -0.025em;\n  --ls-tighter: -0.030em;\n  --ls-display: -0.038em;\n\n  /* ─── 10 · spacing · 4px base ──────────────────────────── */\n  --space-1:   4px;\n  --space-2:   8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-5:  22px;\n  --space-6:  28px;\n  --space-7:  36px;\n  --space-8:  48px;\n  --space-9:  64px;\n  --space-10: 96px;\n\n  /* ─── 11 · shape ───────────────────────────────────────── */\n  --radius-1:  2px;\n  --radius-2:  3px;\n  --radius-3:  4px;\n  --radius-4:  6px;\n  --radius-5: 14px;\n\n  /* ─── 12 · motion · intent-named ───────────────────────── */\n  --tx-fast:        0.15s;\n  --tx-base:        0.20s;\n  --tx-emphasize:   0.25s;\n  --tx-settle:      0.32s;\n  --tx-deliberate:  0.35s;\n  --tx-extended:    0.40s;\n  --tx-long:        0.80s;\n  --ease:           cubic-bezier(0.4, 0, 0.2, 1);\n  --tx-medium: var(--tx-base);\n  --tx-slow:   var(--tx-settle);\n\n  /* ─── 13 · shadow + scrim ──────────────────────────────── */\n  --shadow-soft:    rgba(0,0,0,0.20);\n  --shadow-medium:  rgba(0,0,0,0.30);\n  --shadow-strong:  rgba(0,0,0,0.55);\n  --shadow-card:    0 8px 24px rgba(0,0,0,0.35);\n  --shadow-card-lifted: 0 16px 40px rgba(0,0,0,0.5), 0 0 24px rgba(0,0,0,0.3);\n  --shadow-paper:   0 18px 38px rgba(0,0,0,0.55), 0 6px 14px rgba(0,0,0,0.35);\n  --scrim-modal:    rgba(0,0,0,0.55);\n  --scrim-overlay:  rgba(0,0,0,0.92);\n  --dash-strong:    rgba(142,102,251,0.32);\n  --dash-pink:      rgba(233,0,149,0.30);\n\n  /* ════════════════════════════════════════════════════════════\n     14 · REGISTER ALIASES · the 12-register vocabulary\n     Every wheel hue carries a register-word naming what it does in product UI.\n        Stability   · --alarm        · critical/error\n        Coral       · --surge        · high-energy attention\n        Vitality    · --vital        · brand accent · the move forward\n        Amber-orn   · --watch        · caution / monitoring\n        Agency      · --synthesis    · pattern · will · attention\n        Lime        · --signal       · active streaming · live\n        Connection  · --outreach     · relational · positive\n        Expression  · --ambient      · wash · atmospheric (translucent)\n        Cerulean    · --depth        · sky wash · calm mode\n        Clarity     · --diligence    · intelligence · BRAND PRIMARY\n        Orchid      · --liminal      · transition · in-between · glow\n        Wholeness   · --judgment     · verdict · BRAND SECONDARY\n     ════════════════════════════════════════════════════════════ */\n  --diligence: var(--clarity);\n  --diligence-bg: var(--clarity-bg); --diligence-soft: var(--clarity-soft);\n  --diligence-edge: var(--clarity-edge); --diligence-glow: var(--clarity-glow);\n  --diligence-strong: var(--clarity-strong);\n  --outreach: var(--connection); --outreach-bg: var(--connection-bg);\n  --outreach-soft: var(--connection-soft); --outreach-edge: var(--connection-edge);\n  --outreach-glow: var(--connection-glow); --outreach-strong: var(--connection-strong);\n  --judgment: var(--wholeness); --judgment-bg: var(--wholeness-bg);\n  --judgment-soft: var(--wholeness-soft); --judgment-edge: var(--wholeness-edge);\n  --judgment-glow: var(--wholeness-glow); --judgment-strong: var(--wholeness-strong);\n  --synthesis: var(--agency); --synthesis-bg: var(--agency-bg);\n  --synthesis-soft: var(--agency-soft); --synthesis-edge: var(--agency-edge);\n  --synthesis-glow: var(--agency-glow); --synthesis-strong: var(--agency-strong);\n  --alarm: var(--stability); --alarm-bg: var(--stability-bg);\n  --alarm-soft: var(--stability-soft); --alarm-edge: var(--stability-edge);\n  --alarm-glow: var(--stability-glow); --alarm-strong: var(--stability-strong);\n  --surge: var(--coral); --surge-bg: var(--coral-bg);\n  --surge-soft: var(--coral-soft); --surge-edge: var(--coral-edge);\n  --surge-glow: var(--coral-glow); --surge-strong: var(--coral-strong);\n  --vital: var(--vitality); --vital-bg: var(--vitality-bg);\n  --vital-soft: var(--vitality-soft); --vital-edge: var(--vitality-edge);\n  --vital-glow: var(--vitality-glow); --vital-strong: var(--vitality-strong);\n  --watch: var(--amber-orn); --watch-bg: var(--amber-orn-bg);\n  --watch-soft: var(--amber-orn-soft); --watch-edge: var(--amber-orn-edge);\n  --watch-glow: var(--amber-orn-glow); --watch-strong: var(--amber-orn-strong);\n  --signal: var(--lime); --signal-bg: var(--lime-bg);\n  --signal-soft: var(--lime-soft); --signal-edge: var(--lime-edge);\n  --signal-glow: var(--lime-glow); --signal-strong: var(--lime-strong);\n  --ambient: var(--expression); --ambient-bg: var(--expression-bg);\n  --ambient-soft: var(--expression-soft); --ambient-edge: var(--expression-edge);\n  --ambient-glow: var(--expression-glow); --ambient-wash: var(--expression-wash);\n  --ambient-wash-deep: var(--expression-wash-deep); --ambient-strong: var(--expression-strong);\n  --depth: var(--cerulean); --depth-bg: var(--cerulean-bg);\n  --depth-soft: var(--cerulean-soft); --depth-edge: var(--cerulean-edge);\n  --depth-glow: var(--cerulean-glow); --depth-wash: var(--cerulean-wash);\n  --depth-strong: var(--cerulean-strong);\n  --liminal: var(--orchid); --liminal-bg: var(--orchid-bg);\n  --liminal-soft: var(--orchid-soft); --liminal-edge: var(--orchid-edge);\n  --liminal-glow: var(--orchid-glow); --liminal-strong: var(--orchid-strong);\n\n  /* semantic state migrations · all derived from wheel registers */\n  --good:   var(--connection);\n  --amber:  var(--watch);\n  --red:    var(--alarm);\n\n  /* ════════════════════════════════════════════════════════════\n     15 · FUNCTIONAL UI BINDINGS\n     ════════════════════════════════════════════════════════════ */\n\n  /* action · primary · Clarity */\n  --ui-action-primary:        var(--clarity-500);\n  --ui-action-primary-hover:  var(--clarity-200);\n  --ui-action-primary-active: var(--clarity-600);\n  --ui-action-primary-bg:     var(--clarity-100);\n  --ui-action-primary-border: var(--clarity-400);\n\n  /* action · secondary · neutral chrome */\n  --ui-action-secondary:        var(--text-mid);\n  --ui-action-secondary-hover:  var(--text);\n  --ui-action-secondary-bg:     var(--frame-bg-2);\n  --ui-action-secondary-border: var(--card-border);\n\n  /* action · destructive · alarm */\n  --ui-action-destructive:        var(--alarm);\n  --ui-action-destructive-hover:  var(--stability-200);\n  --ui-action-destructive-bg:     var(--stability-100);\n  --ui-action-destructive-border: var(--stability-400);\n\n  /* state */\n  --ui-state-error:        var(--stability-500);\n  --ui-state-error-bg:     var(--stability-100);\n  --ui-state-error-border: var(--stability-400);\n  --ui-state-success:        var(--connection-500);\n  --ui-state-success-bg:     var(--connection-100);\n  --ui-state-success-border: var(--connection-400);\n  --ui-state-warning:        var(--amber-orn-500);\n  --ui-state-warning-bg:     var(--amber-orn-100);\n  --ui-state-warning-border: var(--amber-orn-400);\n  --ui-state-info:        var(--cerulean-500);\n  --ui-state-info-bg:     var(--cerulean-100);\n  --ui-state-info-border: var(--cerulean-400);\n\n  /* status · live indicators */\n  --ui-status-live:   var(--signal);\n  --ui-status-watch:  var(--watch);\n  --ui-status-alarm:  var(--alarm);\n  --ui-status-idle:   var(--text-mute);\n  --ui-status-done:   var(--connection);\n\n  /* surface · interactive */\n  --ui-focus-ring:    var(--clarity-500);\n  --ui-focus-bg:      var(--clarity-200);\n  --ui-selection:     var(--clarity-300);\n  --ui-link:          var(--clarity-500);\n  --ui-link-hover:    var(--clarity-700);\n  --ui-link-visited:  var(--liminal);\n\n  /* brand 3 surfaces */\n  --ui-brand-primary:   var(--clarity-500);\n  --ui-brand-secondary: var(--wholeness-500);\n  --ui-brand-accent:    var(--vitality-500);\n\n  /* ambient atmosphere · Layer C earned-expressiveness */\n  --ui-ambient-wash:   var(--ambient-wash);\n  --ui-ambient-deep:   var(--ambient-wash-deep);\n  --ui-ambient-glow:   var(--liminal-glow);\n\n  /* constrained gradient grammar · adjacent-hue only */\n  --blend-clarity-to-liminal:    linear-gradient(120deg, var(--clarity-400), var(--liminal-300));\n  --blend-clarity-to-wholeness:  linear-gradient(120deg, var(--clarity-400), var(--wholeness-300));\n  --blend-wholeness-to-clarity:  linear-gradient(120deg, var(--wholeness-400), var(--clarity-300));\n  --blend-vital-to-watch:        linear-gradient(120deg, var(--vital-soft), var(--watch-soft));\n  --blend-vital-to-surge:        linear-gradient(120deg, var(--vital-soft), var(--surge-soft));\n  --blend-connection-to-signal:  linear-gradient(120deg, var(--connection-edge), var(--signal-soft));\n  --blend-ambient-to-depth:      linear-gradient(120deg, var(--ambient-edge), var(--depth-soft));\n  --blend-depth-to-clarity:      linear-gradient(120deg, var(--depth-edge), var(--clarity-soft));\n\n  /* brand 3 spectrum · vital → surge → wholeness → liminal → clarity */\n  --brand-spectrum: linear-gradient(120deg,\n    var(--vitality-400) 0%,\n    var(--coral-300)    25%,\n    var(--wholeness-400) 55%,\n    var(--orchid-300)   80%,\n    var(--clarity-400)  100%);\n\n  /* ambient orbs · Layer C state field */\n  --brand-ambient-orb: radial-gradient(ellipse at 30% 30%,\n    var(--clarity-glow) 0%, var(--ambient-glow) 40%, transparent 70%);\n  --brand-ambient-mist: radial-gradient(ellipse at 50% 80%,\n    var(--ambient-wash) 0%, var(--depth-wash) 40%, transparent 70%);\n\n  /* ════════════════════════════════════════════════════════════\n     16 · DENSITY · ROLE · RELATIONSHIP · CAPABILITY (axes 14-17)\n     ════════════════════════════════════════════════════════════\n     Only spacing tokens scale by density. Type sizes and radius never scale.\n     Use: padding: calc(var(--space-3) * var(--density-scale)); */\n  --density-scale: 1;\n\n  --ui-role-self:           var(--clarity);     /* personal · founder · creator */\n  --ui-role-peer:           var(--synthesis);   /* team · manager · team-lead */\n  --ui-role-cofounder:      var(--clarity);     /* team · symmetric mutual */\n  --ui-role-analyst:        var(--outreach);    /* business · CI · contracting */\n  --ui-role-reviewer:       var(--watch);       /* human-in-loop reviewer */\n  --ui-role-subject:        var(--liminal);     /* the person being read */\n  --ui-role-oversight:      var(--depth);       /* audit · legal · review-only */\n\n  --ui-relationship-edge-self:                  var(--clarity-edge);\n  --ui-relationship-edge-cofounder-mutual:      var(--clarity-edge);\n  --ui-relationship-edge-direct-report:         var(--synthesis-edge);\n  --ui-relationship-edge-advisor:               var(--ambient-edge);\n  --ui-relationship-edge-institutional-subject: var(--outreach-edge);\n  --ui-relationship-edge-self-as-subject:       var(--liminal-edge);\n  --ui-relationship-edge-peer:                  var(--text-mute);\n  --ui-relationship-edge-oversight:             var(--depth-edge);\n  --ui-relationship-edge-public:                var(--alarm-edge);\n\n  --ui-capability-allowed:    var(--ui-action-primary);\n  --ui-capability-restricted: var(--text-mute);\n  --ui-capability-forbidden:  var(--ui-state-error);\n  --ui-capability-review:     var(--amber-orn-500);\n  --ui-capability-joint:      var(--orchid-500);\n  --ui-capability-allowed-bg:    var(--ui-action-primary-bg);\n  --ui-capability-restricted-bg: var(--frame-bg-2);\n  --ui-capability-forbidden-bg:  var(--ui-state-error-bg);\n  --ui-capability-review-bg:     var(--amber-orn-100);\n  --ui-capability-joint-bg:      var(--orchid-100);\n\n  /* legacy aliases · backward-compat with v0.2 surfaces */\n  --accent:        var(--clarity);\n  --accent-soft:   var(--clarity-soft);\n  --accent-bg:     var(--clarity-bg);\n  --accent-glow:   var(--clarity-glow);\n  --accent-faint:  var(--clarity-faint);\n  --accent-tint:   var(--clarity-tint);\n  --accent-edge:   var(--clarity-edge);\n  --pink:          var(--wholeness);\n  --pink-bg:       var(--wholeness-bg);\n  --pink-faint:    var(--wholeness-faint);\n  --pink-edge:     var(--wholeness-edge);\n  --pink-strong:   var(--wholeness-strong);\n}\n\n/* ════════════════════════════════════════════════════════════\n   Density · body-scoped overrides\n   ════════════════════════════════════════════════════════════ */\nbody[data-density=\"anointed\"] { --density-scale: 1.1; }\nbody[data-density=\"shared\"]   { --density-scale: 1.0; }\nbody[data-density=\"analyst\"]  { --density-scale: 0.85; }\nbody[data-product=\"personal\"]:not([data-density]) { --density-scale: 1.1; }\nbody[data-product=\"team\"]:not([data-density])     { --density-scale: 1.0; }\nbody[data-product=\"business\"]:not([data-density]) { --density-scale: 0.85; }\n\n/* relationship-edge accent for the surface frame */\nbody[data-relationship=\"self\"]                  { --ui-relationship-edge: var(--ui-relationship-edge-self); }\nbody[data-relationship=\"cofounder-mutual\"]      { --ui-relationship-edge: var(--ui-relationship-edge-cofounder-mutual); }\nbody[data-relationship=\"direct-report\"]         { --ui-relationship-edge: var(--ui-relationship-edge-direct-report); }\nbody[data-relationship=\"advisor\"]               { --ui-relationship-edge: var(--ui-relationship-edge-advisor); }\nbody[data-relationship=\"institutional-subject\"] { --ui-relationship-edge: var(--ui-relationship-edge-institutional-subject); }\nbody[data-relationship=\"self-as-subject\"]       { --ui-relationship-edge: var(--ui-relationship-edge-self-as-subject); }\nbody[data-relationship=\"peer\"]                  { --ui-relationship-edge: var(--ui-relationship-edge-peer); }\nbody[data-relationship=\"oversight\"]             { --ui-relationship-edge: var(--ui-relationship-edge-oversight); }\nbody[data-relationship=\"public\"]                { --ui-relationship-edge: var(--ui-relationship-edge-public); }\nbody:not([data-relationship])                   { --ui-relationship-edge: var(--frame-border); }\n\n/* ════════════════════════════════════════════════════════════\n   17 · Semantic type — base elements\n   These are conveniences for prose surfaces. UI surfaces use the\n   token primitives directly.\n   ════════════════════════════════════════════════════════════ */\n.l-display, h1.l-display {\n  font-family: var(--display);\n  font-size: var(--fs-display);\n  font-weight: 400;\n  letter-spacing: var(--ls-display);\n  line-height: var(--lh-tight);\n  color: var(--text);\n}\n\n.l-h1 {\n  font-family: var(--display);\n  font-size: var(--fs-3xl);\n  font-weight: 400;\n  letter-spacing: var(--ls-tighter);\n  line-height: var(--lh-snug);\n  color: var(--text);\n}\n.l-h2 {\n  font-family: var(--display);\n  font-size: var(--fs-2xl);\n  font-weight: 400;\n  letter-spacing: var(--ls-tight);\n  line-height: var(--lh-snug);\n  color: var(--text);\n}\n.l-h3 {\n  font-family: var(--display);\n  font-size: var(--fs-xl);\n  font-weight: 400;\n  line-height: var(--lh-snug);\n  color: var(--text);\n}\n\n.l-lede {\n  font-family: var(--serif);\n  font-size: var(--fs-lede);\n  font-weight: 300;\n  font-style: italic;\n  line-height: var(--lh-relaxed);\n  color: var(--text-mid);\n}\n\n.l-serif {\n  font-family: var(--serif);\n  font-size: var(--fs-lg);\n  line-height: var(--lh-relaxed);\n  color: var(--text);\n}\n\n.l-body {\n  font-family: var(--sans);\n  font-size: var(--fs-base);\n  line-height: var(--lh-normal);\n  color: var(--text);\n}\n\n.l-small {\n  font-family: var(--sans);\n  font-size: var(--fs-sm);\n  color: var(--text-mid);\n}\n\n.l-eyebrow {\n  font-family: var(--mono);\n  font-size: var(--fs-mono-sm);\n  font-weight: 500;\n  letter-spacing: var(--ls-mono);\n  text-transform: uppercase;\n  color: var(--text-dim);\n}\n\n.l-mono {\n  font-family: var(--mono);\n  font-size: var(--fs-mono);\n  color: var(--text-mid);\n}\n\n.l-code {\n  font-family: var(--mono);\n  font-size: var(--fs-mono-lg);\n  background: var(--frame-bg-3);\n  padding: 1px 5px;\n  border-radius: var(--radius-2);\n  color: var(--clarity);\n}\n\n.l-blockquote {\n  font-family: var(--serif);\n  font-size: var(--fs-md);\n  f ly: 'Geist Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"2473d22c-066a-41d8-9bf2-3fd72e8ef29b\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Geist Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"9ebffe88-49b2-4012-8606-6fa7af512954\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* symbols2 */\n@font-face {\n  font-family: 'Geist Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"f64a3296-b543-4a27-82bb-e36ae3e6ca17\") format('woff2');\n  unicode-range: U+2000-2001, U+2004-2008, U+200A, U+23B8-23BD, U+2500-259F;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Geist Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"a5614f6c-8ca0-45a8-a788-b125acdd639d\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Geist Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"f3dca4ef-bd8b-4ba1-bb4b-6e50fab40a69\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Geist Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"6dea8dc8-04ea-4b5b-9a73-327d52ebe62c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n\n\n<script type=\"application/json\" id=\"speaker-notes\">\n[\n  \"Organizations are starting to run fleets of agents — and those agents are starting to buy work from other companies' agents. I'm Shruti, from Liminal; we build the layer that lets them trust each other. ERC-8004 gives agents a passport — we give the marketplace a conscience. Thirty seconds on the problem, then I'll show it working on Algorand TestNet.\",\n  \"Every company in this room is about to run agents that buy work from other companies' agents — diligence, research, code review — paid per call over x402. That's vendor procurement across org boundaries, at machine speed. And today's agent markets rank those vendors on price plus self-reported reputation. So the cheapest wins the contract, then charges more than it quoted — and its reputation is a number it typed about itself. You'd never let your team expense against a vendor that rates itself. But that's how your agents buy today. There's no trust layer the chain enforces.\",\n  \"So we built a trust router over x402 on Algorand. For every job, it ranks vendors on price, earned reputation, and validation; pays the winner over x402; then validates what they charged against what they quoted, writes the result to reputation, and reroutes. Caught once, routed around next time. Reputation is earned from payment proof — not asserted. Let me show you.\",\n  \"Your org needs a diligence read. Three vendor agents bid. We rank on price plus earned reputation plus validation — one pick score. Cheapest is Vega; it leads, because it hasn't been caught yet. The operator approves. Vega advertised the lowest quote — but the x402 charge settles higher, on Algorand TestNet, real txid. Your org just got overcharged — and automatic validation catches it from payment proof, no complaint form, drops Vega's reputation, and anchors the verdict hash-only. Now the payoff: same request, again — Vega falls, the router reroutes to the honest vendor. No human edited a list. The chain caught it, and the next decision changed.\",\n  \"Why is this infrastructure, not a feature? x402 is the settlement rail. ERC-8004 names the registries an agent economy needs — identity, reputation, validation — but it doesn't say what makes an entry earned. That discipline is the layer we built. And we built it on Algorand for one reason: the payment and its proof live on the same ledger. Proof-of-payment is native, not a foreign hash you have to trust — and sub-cent finality makes validating every call economical. A marketplace won't build this — they rank on their own take-rate; a neutral, chain-enforced trust layer is the wedge. These three registries are deployed and cross-linked on TestNet right now — here are the app-ids; verify the code hashes yourself. And we ran the full lifecycle on TestNet — register, pay, review, validate, across three independent wallets — every txid in our audit trail.\",\n  \"Zoom out. Liminal governs how an organization's agents operate — what they spend, how they behave. The trust router extends that past your own walls: when your agents buy from agents you don't control, reputation is earned and chain-verified. One control plane for the agent economy — inside the org and across it. What's live today is real and on TestNet: the registries, settlement, anchoring, and the catch-and-reroute. Three wire-ups take it from demo to network — no-custody payments, on-chain ranking, network-wide discovery — and that's exactly what we'd use this prize to land. We want the first real volume routing through us, and design partners running agent fleets. ERC-8004 gives agents a passport. We give the marketplace a conscience. Thank you.\",\n  \"\"\n]\n<\u002Fscript>\n\n<style>\n  deck-stage:not(:defined) { visibility: hidden; }\n\n  :root {\n    /* Slide-scaled type (projection-safe, all >= 24px) */\n    --t-hero:     112px;\n    --t-display:   84px;\n    --t-title:     58px;\n    --t-subtitle:  40px;\n    --t-lede:      34px;\n    --t-body:      30px;\n    --t-small:     25px;\n    --t-mono:      24px;\n    --t-eyebrow:   24px;\n\n    --pad-x:  104px;\n    --pad-y:   84px;\n    --gap:     28px;\n\n    /* deck palette aliases mapped to the role map */\n    --d-pink:  var(--wholeness);      /* brand / verdict / conscience */\n    --d-green: var(--lime);           /* live / verified / honest */\n    --d-blue:  var(--cerulean);       /* chain / infrastructure */\n    --d-red:   var(--stability);      /* cheat / drift / overcharge */\n  }\n\n  /* ── slide base ─────────────────────────────────────────── */\n  .slide {\n    width: 100%;\n    height: 100%;\n    background: var(--bg);\n    color: var(--text);\n    overflow: hidden;\n    position: relative;\n    display: flex;\n    flex-direction: column;\n  }\n  .pad {\n    flex: 1;\n    display: flex;\n    flex-direction: column;\n    padding: var(--pad-y) var(--pad-x);\n    position: relative;\n    z-index: 2;\n  }\n\n  /* atmospheric 64px lattice */\n  .lattice::before {\n    content: \"\";\n    position: absolute;\n    inset: 0;\n    background-image:\n      linear-gradient(rgba(255,255,255,0.014) 1px, transparent 1px),\n      linear-gradient(90deg, rgba(255,255,255,0.014) 1px, transparent 1px);\n    background-size: 64px 64px;\n    z-index: 1;\n    pointer-events: none;\n  }\n\n  /* ── shared type ────────────────────────────────────────── */\n  .eyebrow {\n    font-family: var(--mono);\n    font-size: var(--t-eyebrow);\n    font-weight: 500;\n    letter-spacing: var(--ls-mono);\n    text-transform: uppercase;\n    color: var(--text-dim);\n  }\n  .title {\n    font-family: var(--display);\n    font-weight: 400;\n    font-size: var(--t-title);\n    line-height: 1.04;\n    letter-spacing: var(--ls-display);\n    color: var(--text);\n    text-wrap: balance;\n  }\n  .serif      { font-family: var(--serif); }\n  .mono       { font-family: var(--mono); letter-spacing: var(--ls-mono); text-transform: uppercase; }\n  .pink  { color: var(--d-pink); }\n  .green { color: var(--d-green); }\n  .blue  { color: var(--d-blue); }\n  .red   { color: var(--d-red); }\n\n  /* ── chain badge ────────────────────────────────────────── */\n  .chain-badge {\n    position: absolute;\n    right: var(--pad-x);\n    bottom: 52px;\n    z-index: 3;\n    display: flex;\n    align-items: center;\n    gap: 14px;\n    font-family: var(--mono);\n    font-size: 24px;\n    letter-spacing: var(--ls-mono-sm);\n    text-transform: uppercase;\n    color: var(--text-dim);\n  }\n  .chain-badge .dot {\n    width: 9px; height: 9px; border-radius: 50%;\n    background: var(--d-green);\n    box-shadow: 0 0 12px var(--lime-glow);\n  }\n\n  /* =====================================================================\n     SLIDE 1 — TITLE\n     ===================================================================== */\n  .s1 .pad { justify-content: center; gap: 38px; }\n  .wordmark {\n    font-family: var(--display);\n    font-size: var(--t-hero);\n    line-height: 0.9;\n    letter-spacing: -0.01em;\n    color: var(--d-pink);\n    display: flex;\n    align-items: baseline;\n    gap: 26px;\n  }\n  .wordmark .dia { font-size: 0.62em; color: var(--d-pink); transform: translateY(-0.06em); }\n  .s1 .lede {\n    font-family: var(--serif);\n    font-style: italic;\n    font-weight: 300;\n    font-size: var(--t-display);\n    line-height: 1.02;\n    letter-spacing: -0.02em;\n    color: var(--text);\n    max-width: 20ch;\n  }\n  .s1 .tag {\n    font-family: var(--serif);\n    font-size: var(--t-lede);\n    font-weight: 400;\n    line-height: 1.32;\n    color: var(--text-mid);\n    max-width: 40ch;\n  }\n  .proof {\n    margin-top: 10px;\n    display: inline-flex;\n    align-items: center;\n    gap: 16px;\n    font-family: var(--mono);\n    font-size: var(--t-mono);\n    letter-spacing: var(--ls-mono);\n    text-transform: uppercase;\n    color: var(--d-green);\n  }\n  .proof .dot {\n    width: 11px; height: 11px; border-radius: 50%;\n    background: var(--d-green);\n    box-shadow: 0 0 14px var(--lime-glow);\n  }\n  .footline {\n    position: absolute;\n    left: var(--pad-x);\n    bottom: 52px;\n    font-family: var(--mono);\n    font-size: 24px;\n    letter-spacing: var(--ls-mono-sm);\n    text-transform: uppercase;\n    color: var(--text-dim);\n  }\n\n  /* =====================================================================\n     SLIDE 2 — PROBLEM · vendor ranking\n     ===================================================================== */\n  .head { display: flex; flex-direction: column; gap: 18px; }\n  .head .eyebrow .bar { color: var(--d-pink); margin-right: 4px; }\n\n  .rank {\n    margin-top: 50px;\n    display: flex;\n    flex-direction: column;\n    gap: 14px;\n  }\n  .rank-head, .vrow {\n    display: grid;\n    grid-template-columns: 90px 1fr 200px 360px 320px;\n    align-items: center;\n    column-gap: 28px;\n  }\n  .rank-head {\n    font-family: var(--mono);\n    font-size: 24px;\n    letter-spacing: var(--ls-mono-sm);\n    text-transform: uppercase;\n    color: var(--text-dim);\n    padding: 0 30px 8px;\n    border-bottom: 1px solid var(--frame-border);\n  }\n  .vrow {\n    padding: 26px 30px;\n    border: 1px solid var(--card-border);\n    border-radius: var(--radius-4);\n    background: var(--frame-bg);\n  }\n  .vrow.lead {\n    border-color: var(--stability-400);\n    background: linear-gradient(90deg, var(--stability-100), var(--frame-bg) 60%);\n  }\n  .vrow .rnk { font-family: var(--mono); font-size: 30px; color: var(--text-dim); }\n  .vrow.lead .rnk { color: var(--d-red); }\n  .vname { font-family: var(--serif); font-size: 34px; color: var(--text); }\n  .vname .sub { display: block; font-family: var(--mono); font-size: 24px; letter-spacing: var(--ls-mono-sm); text-transform: uppercase; color: var(--text-dim); margin-top: 8px; }\n  .vquote { font-family: var(--mono); font-size: 28px; color: var(--text); }\n  .repbar { display: flex; flex-direction: column; gap: 9px; }\n  .repbar .track { height: 12px; border-radi
