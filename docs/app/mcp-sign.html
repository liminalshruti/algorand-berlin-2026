<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Liminal MCP Payment Signer</title>
<script type="importmap">
{
  "imports": {
    "https://esm.sh/js-sha3@0.8.0/es2022/js-sha3.mjs": "vendor/js-sha3-shim.js"
  }
}
</script>
<style>
  :root {
    color-scheme: dark;
    --bg: #101216;
    --panel: #171b21;
    --line: #2b333d;
    --text: #f4f0e8;
    --muted: #a9b1bb;
    --accent: #37d4a5;
    --warn: #ff6f7a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: var(--bg);
    color: var(--text);
    font: 15px/1.5 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  main {
    width: min(720px, calc(100vw - 32px));
    border: 1px solid var(--line);
    background: var(--panel);
    padding: 24px;
  }
  header {
    display: flex;
    align-items: start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
  }
  h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 650;
  }
  .subtitle {
    margin: 4px 0 0;
    color: var(--muted);
  }
  .pera-btn,
  button {
    border: 1px solid var(--line);
    background: #20262e;
    color: var(--text);
    padding: 10px 14px;
    min-height: 40px;
    cursor: pointer;
  }
  button.primary {
    border-color: rgba(55, 212, 165, .55);
    background: #17362f;
  }
  button:disabled {
    opacity: .55;
    cursor: wait;
  }
  dl {
    display: grid;
    grid-template-columns: 150px 1fr;
    gap: 10px 14px;
    margin: 0 0 20px;
  }
  dt { color: var(--muted); }
  dd {
    margin: 0;
    overflow-wrap: anywhere;
  }
  code {
    color: #d9fff4;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 13px;
  }
  .actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .status {
    min-height: 24px;
    color: var(--muted);
  }
  .status.ok { color: var(--accent); }
  .status.err { color: var(--warn); }
  pre {
    margin: 16px 0 0;
    max-height: 280px;
    overflow: auto;
    border: 1px solid var(--line);
    padding: 12px;
    background: #0c0f13;
    color: #d7dee8;
    font-size: 12px;
  }
</style>
</head>
<body>
<main>
  <header>
    <div>
      <h1>Liminal MCP payment</h1>
      <p class="subtitle">Sign the routed x402 challenge on Algorand TestNet.</p>
    </div>
    <button class="pera-btn" data-pera-connect>Connect Pera</button>
  </header>

  <dl id="challengeFacts">
    <dt>Status</dt><dd id="loadState">Loading challenge...</dd>
  </dl>

  <div class="actions">
    <button class="primary" id="signBtn" disabled>Sign payment</button>
    <button id="refreshBtn">Refresh</button>
  </div>

  <div id="status" class="status"></div>
  <pre id="proofOut" hidden></pre>
</main>

<script type="module" src="wallet.js"></script>
<script type="module" src="mcp-sign.js"></script>
</body>
</html>
