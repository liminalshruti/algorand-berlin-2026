name: arc8004_localnet

services:
  algod:
    container_name: arc8004_localnet_algod
    image: algorand/algod:latest
    ports:
      - "4001:8080"
      - "4002:7833"
      - "9392:9392"
    environment:
      START_KMD: "1"
      KMD_TOKEN: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      TOKEN: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      ADMIN_TOKEN: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      GOSSIP_PORT: "10000"
    init: true
    volumes:
      - type: bind
        source: ./docker/localnet/algod_config.json
        target: /etc/algorand/config.json
      - type: bind
        source: ./docker/localnet/algod_network_template.json
        target: /etc/algorand/template.json
      - type: bind
        source: ./docker/localnet/goal_mount
        target: /root/goal_mount

  indexer-db:
    container_name: arc8004_localnet_postgres
    image: postgres:16-alpine
    ports:
      - "5443:5432"
    user: postgres
    environment:
      POSTGRES_USER: algorand
      POSTGRES_PASSWORD: algorand
      POSTGRES_DB: indexerdb
    volumes:
      - indexer-db-data:/var/lib/postgresql/data

  conduit:
    container_name: arc8004_localnet_conduit
    image: algorandfoundation/conduit-localnet:latest
    restart: unless-stopped
    volumes:
      - type: bind
        source: ./docker/localnet/conduit.yml
        target: /etc/algorand/conduit.yml
    depends_on:
      - algod
      - indexer-db

  indexer:
    container_name: arc8004_localnet_indexer
    image: algorand/indexer:latest
    ports:
      - "8980:8980"
    restart: unless-stopped
    command: daemon --enable-all-parameters
    environment:
      INDEXER_POSTGRES_CONNECTION_STRING: "host=indexer-db port=5432 user=algorand password=algorand dbname=indexerdb sslmode=disable"
    depends_on:
      - conduit

volumes:
  indexer-db-data:
